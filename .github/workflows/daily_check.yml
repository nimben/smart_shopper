name: Daily Price Check
on:
  schedule:
    - cron: '0 8 * * *' # This means 8:00 AM every day
  workflow_dispatch: # This lets us click a button to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Run my bot
        run: python bot.py
